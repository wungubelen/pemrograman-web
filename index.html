<style>

}

.contact-form label {

}

.contact-form input,

  border: 1px solid #ccc;
  font-size: 13px;
}

.contact-form textarea {
  resize: none; /* tidak bisa diperbesar manual */
}

.contact-form button {
  margin-top: 12px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

.contact-form button:hover {
  background: #555;
}
